<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #e6eef3;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        section {
            width: 350px;
            padding: 40px 25px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 32px;
            color: #1f2937;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
            transition: 0.25s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.25);
        }

        button {
            padding: 12px 20px;
            margin: 10px 5px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
            transition: 0.25s;
        }

        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
        }

        #addBtn {
            background: linear-gradient(90deg, #22c55e, #16a34a);
        }

        #deleteBtn {
            background: linear-gradient(90deg, #ef4444, #dc2626);
        }
    </style>

    <script>
        function login() {
            let user = document.getElementById("username").value;
            let pass = document.getElementById("password").value;

            if (user === "admin@123" && pass === "pass@123") {
                alert("Login successful");

                //Hide login
                document.getElementById("loginTitle").style.display = "none"; // style.display controls whether element is visible or not 
                document.getElementById("username").style.display = "none";
                document.getElementById("password").style.display = "none";
                document.getElementById("loginBtn").style.display = "none";

                //Show admin panel
                document.getElementById("adminTitle").style.display = "block";
                document.getElementById("pname").style.display = "block";
                document.getElementById("pprice").style.display = "block";
                document.getElementById("pimage").style.display = "block";
                document.getElementById("addBtn").style.display = "block";
                document.getElementById("deleteBtn").style.display = "block";

            } else {
                alert("Invalid credentials");
            }



        }

        async function addProduct() {

            let name = document.getElementById("pname").value;
            let price = document.getElementById("pprice").value;
            let image = document.getElementById("pimage").value;

            if (name === "" || price === "" || image === "") {
                alert("Please fill all fields");
                return;
            }

            let data = {
                name: name,
                price: price,
                images_url: image
            };

            let response = await fetch("http://127.0.0.1:8000/add-product", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            let result = await response.json();

            alert(result.message);
        }

        async function deleteProduct() {

            let name = prompt("Enter product name to delete"); // prompt() use mtlb ek aur input box na banana pade,dom handel na krna pade

            if (name === "" || name === null) {
                alert("Product name required");
                return;
            }

            let data = {
                name: name
            };

            let response = await fetch("http://127.0.0.1:8000/delete-product", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            let result = await response.json();

            alert(result.message);
        }

    </script>

</head>

<body>

    <section>



        <h2 id="loginTitle">Admin Login</h2>

        <input type="text" id="username" placeholder="Enter username">
        <input type="password" id="password" placeholder="Enter password">

        <button id="loginBtn" onclick="login()">Login</button>


        <!-- this below code will execute when admin username and pass will be verified -->


        <h2 id="adminTitle" style="display:none;">Admin Panel</h2>

        <input type="text" id="pname" placeholder="Product Name" style="display:none;">
        <input type="text" id="pprice" placeholder="Price" style="display:none;">
        <input type="text" id="pimage" placeholder="Image URL" style="display:none;">

        <button id="addBtn" onclick="addProduct()" style="display:none;">Add Product</button>

        <button id="deleteBtn" onclick="deleteProduct()" style="display:none;">Delete Product</button>

    </section>





</body>

</html>
