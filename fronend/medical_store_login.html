<!DOCTYPE html>
<html>

<head>
    <title>Medical Store Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            background: #f3f6fb;

        }

        .left {
            width: 50%;
            background: url("images/login.jpg");
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #f3f6fb;
            background-size: 50%;
        }

        .right {
            width: 50%;
            background: #f3f6fb;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
        }

        .login-card {
            width: 420px;
            background: white;
            border-radius: 24px;
            padding: 34px 34px 30px 34px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.10);
            text-align: center;
        }

        .brand {
            font-size: 18px;
            font-weight: 700;
            color: #0b3a6e;
            margin-bottom: 16px;
        }

        .welcome {
            font-size: 34px;
            font-weight: 800;
            color: #0b3a6e;
            margin-bottom: 8px;
        }

        .line {
            width: 80px;
            height: 5px;
            background: #10b981;
            border-radius: 10px;
            margin: 14px auto 22px auto;
        }

        .subtitle {
            font-size: 17px;
            color: #64748b;
            margin-bottom: 26px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 15px 18px;
            margin-bottom: 14px;
            border: 1px solid #d7e0ea;
            border-radius: 30px;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: #10b981;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 4px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(to right, #10b981, #14cba8);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-2px);
        }

        #msg {
            min-height: 22px;
            margin-top: 12px;
            font-weight: 600;
        }

        .bottom-text {
            margin-top: 20px;
            color: #64748b;
            font-size: 15px;
        }

        .bottom-text a {
            color: #0b3a6e;
            font-weight: 700;
            text-decoration: none;
        }

        @media (max-width: 950px) {
            body {
                flex-direction: column;
                height: auto;
                overflow: auto;
            }

            .left,
            .right {
                width: 100%;
            }

            .left {
                height: 320px;
                background-position: center top;
            }

            .right {
                padding: 30px 20px;
                background: linear-gradient(to bottom, #f8fbff, #eef3f9);
            }

            .login-card {
                width: 100%;
                max-width: 420px;
                margin-top: 500px;

            }

            .welcome {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <section class="left"></section>

    <section class="right">
        <section class="login-card">
            <div class="brand">💊 Pharmacy</div>
            <div class="welcome">Welcome Back</div>
            <div class="line"></div>
            <div class="subtitle">Please login to your account</div>

            <input type="text" id="email" placeholder="Enter Email">
            <input type="password" id="password" placeholder="Enter Password">

            <button onclick="login()">Log In</button>

            <p id="msg"></p>

            <div class="bottom-text">
                Don't have an account?
                <a href="medical_store_register.html">Sign Up</a>
            </div>
        </section>
    </section>

    <script>
        async function login() {
            let email = document.getElementById("email").value;
            let password = document.getElementById("password").value;

            if (!email || !password) {
                document.getElementById("msg").innerText = "All fields required";
                document.getElementById("msg").style.color = "red";
                return;
            }

            let data = {
                email: email,
                password: password
            };

            let response = await fetch("http://127.0.0.1:8000/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            let result = await response.json();

            document.getElementById("msg").innerText = result.message;
            document.getElementById("msg").style.color = result.status ? "green" : "red";

            if (result.status) {
                localStorage.setItem("username", result.name);
                setTimeout(() => {
                    window.location.href = "medical_store_medicines.html"
                }, 2000);
            }
        }
    </script>

</body>

</html>
