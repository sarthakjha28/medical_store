<!DOCTYPE html>
<html>

<head>
    <title>Cart</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            color: #111827;
        }

        h1 {
            margin: 24px 0 10px 24px;
            font-size: 30px;
            color: #111827;
        }

        button {
            padding: 9px 16px;
            margin: 6px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s ease;
        }

        button:hover {
            transform: translateY(-1px);
        }

        .back-btn {
            background-color: #007185;
            color: white;
        }

        .back-btn:hover {
            background-color: #005f6b;
        }

        .clear-btn {
            background-color: #111827;
            color: white;
        }

        .clear-btn:hover {
            background-color: #374151;
        }

        #cartItems {
            width: 92%;
            max-width: 1100px;
            margin: 20px auto 40px auto;
            text-align: left;
        }

        .cart-card {
            display: block;
            background: white;
            margin-bottom: 16px;
            padding: 16px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: 0.2s ease;
        }

        .cart-card:hover {
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
        }

        .cart-card img {
            width: 140px;
            height: 140px;
            object-fit: contain;
            display: block;
            margin-bottom: 12px;
            background: #fff;
            border-radius: 8px;
        }

        .cart-card b {
            display: block;
            font-size: 20px;
            margin-bottom: 8px;
            color: #111827;
        }

        .price {
            color: #b12704;
            font-size: 18px;
            font-weight: bold;
            margin: 8px 0 12px 0;
        }

        .qty-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            padding: 0;
            font-size: 18px;
            font-weight: bold;
            background-color: #e5e7eb;
            color: #111827;
            vertical-align: middle;
        }

        .qty-btn:hover {
            background-color: #d1d5db;
        }

        .qty-text {
            display: inline-block;
            min-width: 28px;
            text-align: center;
            margin: 0 10px;
            font-size: 17px;
            font-weight: bold;
            color: #111827;
            vertical-align: middle;
        }

        h2 {
            margin: 24px 0 0 0;
            padding: 16px 18px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            text-align: right;
            font-size: 24px;
            color: #111827;
            position: sticky;
            bottom: 10px;
        }

        @media (min-width: 700px) {
            .cart-card {
                display: flex;
                align-items: center;
                gap: 20px;
            }

            .cart-card img {
                margin-bottom: 0;
                flex-shrink: 0;
            }
        }
    </style>

    <script>
        function goBack() {
            window.location.href = "e-commerce_products.html";
        }

        async function loadCart() {
            let response = await fetch("http://127.0.0.1:8000/cart");
            let data = await response.json();

            let output = "";
            let total = 0;

            for (let i = 0; i < data.length; i++) {
                //  total = total + data[i].price;
                total = total + (data[i].price * data[i].quantity);
                output += `
        <section class="cart-card">

            <img src="${data[i].images_url}" style="width:180px; height:140px; border-radius:10px;"><br><br>

            <b>${data[i].name}</b><br>

            <p class="price">₹${data[i].price}</p>

           <p>
                
            <button class="qty-btn" onclick="decreaseQuantity('${data[i].name}')">-</button>

            <span class="qty-text">${data[i].quantity}</span>

            <button class="qty-btn" onclick="increaseQuantity('${data[i].name}')">+</button>

            </p>

        </section>
    `;
            }
            output += `<h2 style="color:#4ade80; margin-top:30px;">Total: ₹${total}</h2>`;

            document.getElementById("cartItems").innerHTML = output;
        }

        async function clearCart() {
            let response = await fetch("http://127.0.0.1:8000/clear-cart", {
                method: "DELETE"
            });

            let result = await response.json();

            alert(result.message);

            loadCart();
        }


        async function increaseQuantity(productName) {
            let response = await fetch("http://127.0.0.1:8000/increase-quantity", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name: productName })
            });

            let result = await response.json();

            loadCart();
            console.log(productName)
        }

        async function decreaseQuantity(productName) {
            let response = await fetch("http://127.0.0.1:8000/decrease-quantity", {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ name: productName })
            });

            let result = await response.json();

            loadCart();
        }
    </script>

    <script>
        loadCart();
    </script>
</head>

<body>

    <h1>Your Cart</h1>
    <button class="back-btn" onclick="goBack()">Back to Products</button>
    <button class="clear-btn" onclick="clearCart()">Clear Cart</button>

    <section id="cartItems"></section>
</body>

</html>
