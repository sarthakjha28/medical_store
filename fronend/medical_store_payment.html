<!DOCTYPE html>
<html>

<head>
    <title>Payment </title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(to bottom, #f8fbff, #eef4fb);
            color: #1f2937;
            text-align: center;
        }

        h1 {
            margin: 0;
            padding: 18px;
            background: linear-gradient(to right, #0b3a6e, #0d6efd);
            color: white;
            font-size: 30px;
            font-weight: 800;
            box-shadow: 0 4px 16px rgba(13, 110, 253, 0.15);
        }

        .box {
            width: 92%;
            max-width: 580px;
            margin: 34px auto;
            background: white;
            padding: 28px;
            border-radius: 24px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
            text-align: left;
        }

        .box h3 {
            margin-top: 0;
            margin-bottom: 18px;
            font-size: 24px;
            color: #0b3a6e;
            font-weight: 800;
            text-align: center;
        }

        /* Payment option card */
        .box p {
            margin: 14px 0;
            padding: 16px 18px;
            border: 1px solid #e5edf7;
            border-radius: 16px;
            background: #f9fbff;
            font-size: 16px;
            font-weight: 700;
            color: #334155;
            transition: 0.25s;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Hover */
        .box p:hover {
            border-color: #93c5fd;
            background: #f0f7ff;
            transform: translateY(-1px);
        }

        /* Radio */
        input[type="radio"] {
            margin-right: 12px;
            transform: scale(1.2);
            accent-color: #10b981;
        }

        /* Selected card */
        .box p:has(input[type="radio"]:checked) {
            border: 2px solid #10b981;
            background: linear-gradient(to right, #ecfdf5, #f0fdf4);
            box-shadow: 0 10px 22px rgba(16, 185, 129, 0.18);
            transform: scale(1.02);
        }

        /* Add icon feeling through text layout */
        .box p::after {
            margin-left: auto;
            font-size: 13px;
            font-weight: 700;
            color: #64748b;
            background: white;
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid #e5edf7;
        }

        /* Different tags */
        .box p:nth-of-type(1)::after {
            content: "Secure";
        }

        .box p:nth-of-type(2)::after {
            content: "Fast";
        }

        .box p:nth-of-type(3)::after {
            content: "Easy";
        }

        /* Total */
        #total {
            text-align: center;
            margin: 22px 0 18px;
            padding: 16px;
            background: linear-gradient(to right, #eff6ff, #f8fbff);
            border-radius: 16px;
            font-size: 24px;
            font-weight: 900;
            color: #0b3a6e;
            border: 1px solid #dbeafe;
        }

        /* Buttons */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.22s;
        }

        button:hover {
            transform: translateY(-1px);
        }

        button:first-of-type {
            background: linear-gradient(to right, #10b981, #06d6a0);
            color: white;
            box-shadow: 0 10px 22px rgba(16, 185, 129, 0.18);
        }

        button:first-of-type:hover {
            opacity: 0.96;
        }

        button:last-of-type {
            background: white;
            color: #0b3a6e;
            border: 1px solid #d7e0ea;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        }

        button:last-of-type:hover {
            background: #eff6ff;
        }

        #msg {
            text-align: center;
            font-weight: 700;
            margin-top: 16px;
            min-height: 24px;
        }

        @media (max-width: 600px) {
            .box {
                padding: 22px 18px;
            }

            h1 {
                font-size: 24px;
            }

            #total {
                font-size: 20px;
            }
        }
    </style>

     <script>
        window.onload = function () {
            loadTotal();
        };


        async function loadTotal() {
            let response = await fetch("http://127.0.0.1:8000/cart");
            let data = await response.json();

            let total = 0;

            for (let i = 0; i < data.length; i++) {
                total += data[i].price * data[i].quantity;
            }

            document.getElementById("total").innerText = "Total Amount: ₹" + total;
        }

        async function confirmPayment() {

            let methods = document.getElementsByName("payment");
            let selected = "";

            for (let i = 0; i < methods.length; i++) {
                if (methods[i].checked) {
                    selected = methods[i].value;
                }
            }

            if (selected === "") {
                document.getElementById("msg").style.color = "red";
                document.getElementById("msg").innerText = "Please select a payment method";
                return;
            }

            // clear cart from backend
            await fetch("http://127.0.0.1:8000/clear-cart", {
                method: "DELETE"
            });

            document.getElementById("msg").style.color = "green";
            document.getElementById("msg").innerText = "Order placed successfully using " + selected;

            // optional redirect after 2 sec
            setTimeout(() => {
                window.location.href = "medical_store_medicines.html";
            }, 2000);

        }
        function goBack() {
            window.location.href = "medical_store_cart.html";
        }



    </script>
</head>

<body>

    <h1>Payment Page 💳</h1>

    <section class="box">
        <h3>Select Payment Method</h3>

        <p>
            <input type="radio" name="payment" value="Card"> 💳 Credit / Debit Card
        </p>

        <p>
            <input type="radio" name="payment" value="UPI"> 📱 UPI Payment
        </p>

        <p>
            <input type="radio" name="payment" value="COD"> 🚚 Cash on Delivery
        </p>

        <h3 id="total"></h3>

        <button onclick="confirmPayment()">Confirm Payment</button>
        <button onclick="goBack()">Back to Cart</button>

        <p id="msg"></p>
    </section>

   

</body>

</html>
