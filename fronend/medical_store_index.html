<!DOCTYPE html>
<html>

<head>
    <title>Medical Store</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            overflow: hidden;

            background:
                linear-gradient(to right, rgba(9, 38, 79, 0.55), rgba(9, 38, 79, 0.10)),
                url("images/index.jpg");

            background-size: cover;
            background-position: center 68%;
            background-repeat: no-repeat;

            display: flex;
            justify-content: flex-start;
            align-items: center;

            padding-left: 70px;
        }

        /* card */
        .container {
            width: 380px;
            padding: 30px;
            border-radius: 20px;

            background: rgba(255, 255, 255, 0.10);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            color: white;
            text-align: left;

            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
            border: 1px solid rgba(255, 255, 255, 0.12);

            transform: translateY(120px);

            animation: cardFadeUp 0.9s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(115px);
            box-shadow: 0 18px 38px rgba(0, 0, 0, 0.34);
        }

        @keyframes cardFadeUp {
            from {
                opacity: 0;
                transform: translateY(170px);
            }

            to {
                opacity: 1;
                transform: translateY(120px);
            }
        }

        h1 {
            font-size: 32px;
            margin: 0 0 10px 0;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.22);
        }

        p {
            font-size: 16px;
            margin: 0 0 25px 0;
            color: #dbeafe;
            line-height: 1.5;
        }

        button {
            display: block;
            width: 210px;
            padding: 14px;
            margin-bottom: 12px;

            border: none;
            border-radius: 30px;

            background: linear-gradient(135deg, #ffffff, #eef6ff);
            color: #0d3b66;

            font-size: 16px;
            font-weight: bold;
            cursor: pointer;

            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
        }

        button:hover {
            background: linear-gradient(135deg, #10b981, #06d6a0);
            color: white;
            transform: translateY(-2px);
        }
    </style>



    <script>
        function goToLogin() {
            window.location.href = "medical_store_login.html";
        }

        function goToRegister() {
            window.location.href = "medical_store_register.html";
        }
    </script>
</head>

<body>

    <section class="container">
        <h1>MediCare Store</h1>
        <p>Trusted medicines and healthcare products</p>

        <button onclick="goToLogin()">Login</button>
        <button onclick="goToRegister()">Register</button>
    </section>



</body>

</html>
