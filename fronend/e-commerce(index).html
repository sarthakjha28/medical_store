<!DOCTYPE html>
<html>

<head>
    <title>E-Commerce Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #dff6ff, #f7fbff, #ffffff);
            overflow-x: hidden;
            animation: bgMove 8s infinite alternate;
        }

        @keyframes bgMove {
            0% {
                background-position: left;
            }

            100% {
                background-position: right;
            }
        }

        h1 {
            font-size: 50px;
            color: #1e2a38;
            margin-top: 100px;
            margin-bottom: 10px;
            animation: slideDown 1s ease;
        }

        h2 {
            font-size: 24px;
            color: #3b82f6;
            margin-bottom: 20px;
            animation: fadeIn 2s ease;
        }

        p {
            font-size: 18px;
            color: #555;
            line-height: 1.7;
            margin-bottom: 35px;
            animation: fadeIn 2.5s ease;
        }

        section {
            width: 75%;
            margin: 70px auto;
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(8px);
            animation: zoomIn 1.2s ease;
        }

        button {
            padding: 14px 26px;
            margin: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            background: linear-gradient(90deg, #3b82f6, #2563eb);
            box-shadow: 0 6px 14px rgba(59, 130, 246, 0.3);
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
        }

        button:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
        }

        button:active {
            transform: scale(0.98);
        }

        .glow {
            font-size: 70px;
            animation: floatIcon 3s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes floatIcon {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
    <script>
        function goToLogin() {
            window.location.href = "e-commerce_login.html";
        }

        function goToRegister() {
            window.location.href = "e-commerce_register.html";
        }

        function goToProducts() {
            window.location.href = "e-commerce_products.html";
        }

        
    </script>
    
</head>

<body> 

    <section>
        <p class="glow">🛒</p>
        <h1>Welcome to My Store</h1>
        <h2>Shop Smart. Shop Easy.</h2>
        <p>
            Discover stylish products, explore fresh collections,
            and enjoy a smooth shopping experience.
        </p>

        <button onclick="goToLogin()">Login</button>
        <button onclick="goToRegister()">Register</button>
        <button onclick="goToProducts()">View Products</button>

    </section>




</body>

</html>
